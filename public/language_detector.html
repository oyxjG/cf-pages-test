<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GravityLingo - 智能语言探测器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        :root {
            --bg: #f3ede4;
            --paper: rgba(255, 251, 246, 0.85);
            --text: #251c15;
            --muted: #6f6256;
            --accent: #bf5b32;
            --line: rgba(84, 66, 49, 0.12);
            --radius: 20px;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #f6f0e8 0%, var(--bg) 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--paper);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: 0 30px 90px rgba(67, 43, 25, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .back-link {
          position: absolute;
          top: 24px;
          left: 24px;
          text-decoration: none;
          color: var(--muted);
          font-size: 14px;
          font-weight: 600;
          display: flex;
          align-items: center;
          gap: 6px;
        }

        .header { margin-bottom: 8px; }
        .header h1 { margin: 0; font-size: 32px; letter-spacing: -0.02em; }
        .header p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }

        .editor-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.5);
            font-family: inherit;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text);
            resize: none;
            outline: none;
            transition: all 0.2s;
        }

        textarea:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 4px rgba(191, 91, 50, 0.1);
        }

        .actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 99px;
            background: var(--accent);
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .result-card {
            background: rgba(84, 66, 49, 0.04);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 20px;
        }

        .res-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
        .res-value { font-size: 20px; font-weight: 700; color: var(--accent); }
        
        .confidence-bar {
            height: 6px;
            background: rgba(84, 66, 49, 0.1);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }
        .confidence-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.8s; }

        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag { background: rgba(191, 91, 50, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; }

        pre {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        返回首页
    </a>

    <div class="container">
        <div class="header">
            <h1>GravityLingo 辨识引擎</h1>
            <p>基于 Unicode 脚本分析与词频统计，智能探测自然语言及编程语言类型。</p>
        </div>

        <div class="editor-container">
            <textarea id="textInput" placeholder="在此粘贴需要识别的内容..."></textarea>
            <div class="actions">
                <button class="btn" onclick="detectLanguage()">立即智能探测</button>
                <div id="charCount" style="font-size: 13px; color: var(--muted);">0 字符</div>
            </div>
        </div>

        <div class="results-grid" id="results">
            <div class="result-card">
                <div class="res-label">自然语言识别</div>
                <div class="res-value" id="nlValue">等待输入</div>
                <div id="nlDetail" style="font-size: 13px; color: var(--muted); margin-top: 4px;">ISO 代码: -</div>
                <div class="confidence-bar"><div class="confidence-fill" id="nlConf"></div></div>
            </div>

            <div class="result-card">
                <div class="res-label">编程语言识别</div>
                <div class="res-value" id="plValue">等待探测</div>
                <div id="plDetail" style="font-size: 13px; color: var(--muted); margin-top: 4px;">相关度分数: 0</div>
                <div class="confidence-bar"><div class="confidence-fill" id="plConf"></div></div>
            </div>

            <div class="result-card">
                <div class="res-label">文本特征属性</div>
                <div class="tag-list" id="tags">
                    <span class="tag">就绪</span>
                </div>
            </div>
        </div>

        <pre id="codePreview"><code id="highlightedCode"></code></pre>
    </div>

    <script src="franc.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        const input = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');

        input.oninput = () => { charCount.innerText = `${input.value.length} 字符`; };

        async function detectLanguage() {
            const text = input.value.trim();
            if (!text) return;

            // 1. 自然语言识别
            const nlResults = francAll(text);
            const topCode = nlResults[0][0];
            const topConf = nlResults[0][1];

            document.getElementById('nlValue').innerText = getLangName(topCode);
            document.getElementById('nlDetail').innerText = `ISO 代码: ${topCode.toUpperCase()}`;
            document.getElementById('nlConf').style.width = `${Math.min(topConf, 100)}%`;

            // 2. 编程语言识别
            const hlResult = hljs.highlightAuto(text);
            const isCode = hlResult.relevance > 2;

            if (isCode) {
                document.getElementById('plValue').innerText = hlResult.language || '未知代码';
                document.getElementById('plDetail').innerText = `相关度分数: ${hlResult.relevance}`;
                document.getElementById('plConf').style.width = `${Math.min(hlResult.relevance * 10, 100)}%`;
                
                const preview = document.getElementById('codePreview');
                const code = document.getElementById('highlightedCode');
                code.innerHTML = hlResult.value;
                preview.style.display = 'block';
            } else {
                document.getElementById('plValue').innerText = '非代码文本';
                document.getElementById('plDetail').innerText = '相关度极低';
                document.getElementById('plConf').style.width = '0%';
                document.getElementById('codePreview').style.display = 'none';
            }

            // 3. 标签生成
            generateTags(text, isCode);
        }

        function generateTags(text, isCode) {
            const tagContainer = document.getElementById('tags');
            tagContainer.innerHTML = '';
            const tags = [];

            if (text.length < 20) tags.push('短文本');
            else if (text.length > 500) tags.push('长篇幅');

            if (isCode) tags.push('结构化代码');
            if (/[0-9]/.test(text)) tags.push('含数字');
            
            if (/[\u4e00-\u9fff]/.test(text)) tags.push('中文');
            if (/[a-zA-Z]/.test(text)) tags.push('拉丁/英文');
            if (/[\u3040-\u309f]/.test(text)) tags.push('日文');
            if (/[\u0400-\u04ff]/.test(text)) tags.push('西里尔');

            tags.forEach(t => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.innerText = t;
                tagContainer.appendChild(span);
            });
        }
    </script>
</body>
</html>
