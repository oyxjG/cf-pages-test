<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>颜色代码转换器 - 高级聚合面板</title>
  <style>
    :root {
      --bg: #f3ede4;
      --paper: rgba(255, 251, 246, 0.85);
      --text: #251c15;
      --muted: #6f6256;
      --accent: #bf5b32;
      --line: rgba(84, 66, 49, 0.12);
      --radius: 20px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #f6f0e8 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      background: var(--paper);
      backdrop-filter: blur(20px);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: 0 30px 90px rgba(67, 43, 25, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .back-link {
      position: absolute;
      top: 24px;
      left: 24px;
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    .header { margin-bottom: 32px; }
    .header h1 { margin: 0; font-size: 32px; letter-spacing: -0.02em; }
    .header p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }

    .main-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 40px;
    }

    /* 调色盘与预览 */
    .color-preview-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #colorPreview {
      width: 100%;
      height: 240px;
      border-radius: 16px;
      background: #479169;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.2), 0 20px 40px rgba(0,0,0,0.1);
      transition: background 0.1s;
    }

    .native-picker {
        width: 100%;
        height: 50px;
        padding: 0;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background: transparent;
    }

    /* 输入框网格 */
    .inputs-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-weight: 700; font-size: 12px; text-transform: uppercase; color: var(--muted); }
    
    .input-group {
      display: flex;
      gap: 8px;
    }

    input[type="text"], input[type="number"] {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.5);
      font-family: "Fira Code", monospace;
      font-size: 14px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); background: white; }

    .btn {
      padding: 12px 24px;
      border-radius: 999px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      background: #3182ce;
      color: white;
      margin-top: 20px;
    }

    .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }

    @media (max-width: 850px) {
      .main-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    返回首页
  </a>

  <div class="container">
    <div class="header">
      <h1>颜色代码转换器</h1>
      <p>在 HEX、RGB、CMYK、HSL 和 HSV 格式之间实时转换颜色代码。</p>
    </div>

    <div class="main-grid">
      <div class="color-preview-section">
        <div id="colorPreview"></div>
        <input type="color" class="native-picker" id="colorPicker" value="#479169" oninput="updateFromPicker(this.value)">
        <button class="btn" onclick="randomColor()">随机颜色</button>
      </div>

      <div class="inputs-grid">
        <div class="field">
          <label>HEX</label>
          <input type="text" id="hex" placeholder="479169" oninput="updateFromHex(this.value)">
        </div>

        <div class="field">
          <label>RGB</label>
          <div class="input-group">
            <input type="number" id="r" placeholder="R" min="0" max="255" oninput="updateFromRgb()">
            <input type="number" id="g" placeholder="G" min="0" max="255" oninput="updateFromRgb()">
            <input type="number" id="b" placeholder="B" min="0" max="255" oninput="updateFromRgb()">
          </div>
        </div>

        <div class="field">
            <label>CMYK (%)</label>
            <div class="input-group">
              <input type="number" id="c" placeholder="C" min="0" max="100" oninput="updateFromCmyk()">
              <input type="number" id="m" placeholder="M" min="0" max="100" oninput="updateFromCmyk()">
              <input type="number" id="y" placeholder="Y" min="0" max="100" oninput="updateFromCmyk()">
              <input type="number" id="k" placeholder="K" min="0" max="100" oninput="updateFromCmyk()">
            </div>
        </div>

        <div class="field">
            <label>HSL</label>
            <div class="input-group">
              <input type="number" id="h_l" placeholder="H" min="0" max="360" oninput="updateFromHsl()">
              <input type="number" id="s_l" placeholder="S" min="0" max="100" oninput="updateFromHsl()">
              <input type="number" id="l_l" placeholder="L" min="0" max="100" oninput="updateFromHsl()">
            </div>
        </div>

        <div class="field">
            <label>HSV / HSB</label>
            <div class="input-group">
              <input type="number" id="h_v" placeholder="H" min="0" max="360" oninput="updateFromHsv()">
              <input type="number" id="s_v" placeholder="S" min="0" max="100" oninput="updateFromHsv()">
              <input type="number" id="v_v" placeholder="V" min="0" max="100" oninput="updateFromHsv()">
            </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const preview = document.getElementById('colorPreview');
    const picker = document.getElementById('colorPicker');

    // 各种格式的输入框
    const inputs = {
        hex: document.getElementById('hex'),
        r: document.getElementById('r'), g: document.getElementById('g'), b: document.getElementById('b'),
        c: document.getElementById('c'), m: document.getElementById('m'), y: document.getElementById('y'), k: document.getElementById('k'),
        h_l: document.getElementById('h_l'), s_l: document.getElementById('s_l'), l_l: document.getElementById('l_l'),
        h_v: document.getElementById('h_v'), s_v: document.getElementById('s_v'), v_v: document.getElementById('v_v'),
    };

    // 初始化调用一次
    updateFromPicker('#479169');

    function updateFromPicker(hex) {
        syncAll(hex);
    }

    function updateFromHex(hex) {
        if (!hex.startsWith('#')) hex = '#' + hex;
        if (/^#[0-9A-F]{6}$/i.test(hex)) {
            syncAll(hex);
        }
    }

    function updateFromRgb() {
        const r = parseInt(inputs.r.value) || 0;
        const g = parseInt(inputs.g.value) || 0;
        const b = parseInt(inputs.b.value) || 0;
        syncAll(rgbToHex(r, g, b));
    }

    function updateFromCmyk() {
        const c = (parseInt(inputs.c.value) || 0) / 100;
        const m = (parseInt(inputs.m.value) || 0) / 100;
        const y = (parseInt(inputs.y.value) || 0) / 100;
        const k = (parseInt(inputs.k.value) || 0) / 100;
        
        const r = Math.round(255 * (1 - c) * (1 - k));
        const g = Math.round(255 * (1 - m) * (1 - k));
        const b = Math.round(255 * (1 - y) * (1 - k));
        syncAll(rgbToHex(r, g, b));
    }

    function updateFromHsl() {
        const h = parseInt(inputs.h_l.value) || 0;
        const s = parseInt(inputs.s_l.value) || 0;
        const l = parseInt(inputs.l_l.value) || 0;
        syncAll(hslToHex(h, s, l));
    }

    function updateFromHsv() {
        const h = parseInt(inputs.h_v.value) || 0;
        const s = parseInt(inputs.s_v.value) || 0;
        const v = parseInt(inputs.v_v.value) || 0;
        syncAll(hsvToHex(h, s, v));
    }

    function randomColor() {
        const hex = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        syncAll(hex);
    }

    // 核心同步函数
    function syncAll(hex) {
        preview.style.background = hex;
        picker.value = hex;
        inputs.hex.value = hex.replace('#', '').toUpperCase();
        
        const rgb = hexToRgb(hex);
        inputs.r.value = rgb.r;
        inputs.g.value = rgb.g;
        inputs.b.value = rgb.b;

        const cmyk = rgbToCmyk(rgb.r, rgb.g, rgb.b);
        inputs.c.value = cmyk.c;
        inputs.m.value = cmyk.m;
        inputs.y.value = cmyk.y;
        inputs.k.value = cmyk.k;

        const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
        inputs.h_l.value = hsl.h;
        inputs.s_l.value = hsl.s;
        inputs.l_l.value = hsl.l;

        const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
        inputs.h_v.value = hsv.h;
        inputs.s_v.value = hsv.s;
        inputs.v_v.value = hsv.v;
    }

    // 转换工具函数
    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return { r, g, b };
    }

    function rgbToHex(r, g, b) {
        const toHex = n => Math.max(0, Math.min(255, n)).toString(16).padStart(2, '0');
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function rgbToCmyk(r, g, b) {
        let rr = r / 255, gg = g / 255, bb = b / 255;
        let k = 1 - Math.max(rr, gg, bb);
        let c = (1 - rr - k) / (1 - k) || 0;
        let m = (1 - gg - k) / (1 - k) || 0;
        let y = (1 - bb - k) / (1 - k) || 0;
        return {
            c: Math.round(c * 100),
            m: Math.round(m * 100),
            y: Math.round(y * 100),
            k: Math.round(k * 100)
        };
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; } 
        else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    }

    function hslToHex(h, s, l) {
        l /= 100;
        const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`;
    }

    function rgbToHsv(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, v = max;
        const d = max - min;
        s = max === 0 ? 0 : d / max;
        if (max === min) { h = 0; }
        else {
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return { h: Math.round(h * 360), s: Math.round(s * 100), v: Math.round(v * 100) };
    }

    function hsvToHex(h, s, v) {
        v /= 100; s /= 100;
        const f = (n) => {
            const k = (n + h / 60) % 6;
            return v - v * s * Math.max(0, Math.min(k, 4 - k, 1));
        };
        const toHex = (n) => Math.round(n * 255).toString(16).padStart(2, '0');
        return `#${toHex(f(5))}${toHex(f(3))}${toHex(f(1))}`;
    }
  </script>
</body>
</html>
